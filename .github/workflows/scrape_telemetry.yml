name: 24/7 All-India Telemetry

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes, 24/7/365
  workflow_dispatch:          # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run All-India Scraper
        run: python backend/manual_scrape.py

      - name: Commit & Push
        run: |
          git config user.name "Pravhatattva Bot"
          git config user.email "action@github.com"
          git add frontend/public/mock/*.json
          git diff --cached --quiet || git commit -m "data: all-india telemetry update [skip ci]"
          git push
