name: Telemetry Sync Pipeline

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: pip install requests

      - name: Run data scraper
        run: python backend/data_scraper.py

      - name: Commit and push data files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/mock/
          git diff --staged --quiet && echo "No data changes" && exit 0
          git commit -m "data: telemetry sync $(date -u +%H:%M) UTC"
          git pull origin main --rebase
          git push origin main
