version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - floodsentinel-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=cache
      - PORT=8000
    depends_on:
      - cache
    networks:
      - floodsentinel-net

  cache:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - floodsentinel-net

networks:
  floodsentinel-net:
    driver: bridge
